networks:
  soc-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-10.100.0.0/24}
          gateway: ${GATEWAY:-10.100.0.1}

volumes:
  elasticsearch-data:
    driver: local
  wazuh-manager-data:
    driver: local
  wazuh-indexer-data:
    driver: local
  wazuh-dashboard-data:
    driver: local
  thehive-data:
    driver: local
  cortex-data:
    driver: local
  misp-data:
    driver: local
  misp-db-data:
    driver: local
  postgres-data:
    driver: local
  cassandra-data:
    driver: local
  redis-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  minio-data:
    driver: local
  minio-config:
    driver: local
  shuffle-data:
    driver: local
  opensearch-data:
    driver: local
  suricata_rules:
    driver: local
  zeek_data:
    driver: local

services:
  # ==================== NETWORK INFRASTRUCTURE ====================

  nginx:
    image: nginx:alpine
    container_name: soc-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT_HTTP:-80}:80"
      - "${NGINX_PORT_HTTPS:-443}:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      soc-network:
        ipv4_address: 10.100.0.10
    depends_on:
      - kibana
      - wazuh-dashboard
      - thehive
      - grafana
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  docs-site:
    image: nginx:alpine
    container_name: soc-docs
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-8090}:80"
    volumes:
      - ./docs:/usr/share/nginx/html:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.14
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: soc-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS:-RedisSoc123!}
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      soc-network:
        ipv4_address: 10.100.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-RedisSoc123!}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-socadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-PostgresSoc123!}
      POSTGRES_DB: ${POSTGRES_DB:-socdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      soc-network:
        ipv4_address: 10.100.0.12
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socadmin} -d ${POSTGRES_DB:-socdb}"]
      interval: 15s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    container_name: soc-cassandra
    restart: unless-stopped
    environment:
      - CASSANDRA_CLUSTER_NAME=soc-cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_ENDPOINT_SNITCH=GossipingPropertyFileSnitch
      - MAX_HEAP_SIZE=1G
      - HEAP_NEWSIZE=256M
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      soc-network:
        ipv4_address: 10.100.0.13
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' localhost 9042"]
      interval: 30s
      timeout: 10s
      retries: 20

  # ==================== ELASTIC STACK (SIEM CORE) ====================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.11.0}
    container_name: soc-elasticsearch
    restart: unless-stopped
    environment:
      - cluster.name=${ELASTIC_CLUSTER_NAME:-soc-cluster}
      - node.name=${ELASTIC_NODE_NAME:-node-1}
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms${ELASTIC_HEAP_SIZE:-2g} -Xmx${ELASTIC_HEAP_SIZE:-2g}"
      - xpack.security.enabled=true
      - xpack.security.authc.api_key.enabled=true
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
      - ELASTIC_USERNAME=elastic
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
      - ./configs/elastic/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    networks:
      soc-network:
        ipv4_address: 10.100.0.20
    healthcheck:
      test: ["CMD", "curl", "-s", "-u", "elastic:${ELASTIC_PASSWORD:-ChangeMeElastic123!}", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.11.0}
    container_name: soc-kibana
    restart: unless-stopped
    environment:
      - SERVER_NAME=kibana.soc-lab.local
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-kb_enc_ChangeMe_32chars_long_key}
      - XPACK_SECURITY_ENABLED=true
      - XPACK_FLEET_ENABLED=true
      - XPACK_SIEM_ENABLED=true
      - SERVER_PUBLICBASEURL=http://kibana.soc-lab.local:5601
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    volumes:
      - ./configs/elastic/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - ./dashboards/kibana:/usr/share/kibana/dashboards:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.21
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "-w", "%{http_code}", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION:-8.11.0}
    container_name: soc-logstash
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
      - "LS_JAVA_OPTS=-Xms1g -Xmx1g"
      - MONITORING_ENABLED=false
    ports:
      - "${LOGSTASH_PORT:-5044}:5044"
      - "${LOGSTASH_PORT_SYSLOG:-5514}:5514/udp"
      - "9600:9600"
    volumes:
      - ./configs/logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./configs/logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.22
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9600/_node/pipelines"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== WAZUH SIEM/XDR ====================

  wazuh-indexer:
    image: wazuh/wazuh-indexer:${WAZUH_VERSION:-4.9.0}
    container_name: soc-wazuh-indexer
    restart: unless-stopped
    environment:
      - cluster.name=wazuh-cluster
      - node.name=wazuh-indexer-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
    ports:
      - "9201:9200"
    networks:
      soc-network:
        ipv4_address: 10.100.0.30
    healthcheck:
      test: ["CMD", "curl", "-k", "-u", "admin:${ELASTIC_PASSWORD:-ChangeMeElastic123!}", "https://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 10

  wazuh-manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION:-4.9.0}
    container_name: soc-wazuh-manager
    restart: unless-stopped
    hostname: wazuh-manager
    environment:
      - WAZUH_MANAGER_IP=0.0.0.0
      - WAZUH_REGISTRATION_PASSWORD=${WAZUH_REGISTRATION_PASSWORD:-WazuhReg123!}
      - WAZUH_API_USER=${WAZUH_API_USER:-wazuh-wui}
      - WAZUH_API_PASS=${WAZUH_API_PASS:-WazuhApi123!}
      - THEHIVE_URL=http://thehive:9000
      - THEHIVE_API_KEY=${THEHIVE_API_KEY:-}
      - MISP_URL=https://misp-core
      - MISP_API_KEY=${MISP_ADMIN_PASSKEY:-ChangeMeMispKey123!}
    ports:
      - "1514:1514"
      - "1515:1515"
      - "1516:1516"
      - "514:514/udp"
      - "${WAZUH_MANAGER_PORT:-55000}:55000"
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - ./configs/wazuh/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./configs/wazuh/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./configs/wazuh/custom_decoders.xml:/var/ossec/etc/decoders/custom_decoders.xml:ro
      - ./integrations/wazuh_thehive.py:/var/ossec/integrations/custom-w2thive.py:ro
      - ./integrations/wazuh_misp.py:/var/ossec/integrations/custom-w2misp.py:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.31
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/var/ossec/bin/wazuh-control", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION:-4.9.0}
    container_name: soc-wazuh-dashboard
    restart: unless-stopped
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
      - DASHBOARD_SERVER_NAME=wazuh-dashboard.soc-lab.local
      - DASHBOARD_SERVER_HOST=0.0.0.0
      - API_URL=https://wazuh-manager:55000
      - API_USERNAME=${WAZUH_API_USER:-wazuh-wui}
      - API_PASSWORD=${WAZUH_API_PASS:-WazuhApi123!}
    ports:
      - "4431:443"
    volumes:
      - wazuh-dashboard-data:/usr/share/wazuh-dashboard/data
      - ./dashboards/wazuh:/usr/share/wazuh-dashboard/dashboards:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.32
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-s", "-o", "/dev/null", "-w", "%{http_code}", "https://localhost:443/status"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==================== THEHIVE + CORTEX (IR & CASE MANAGEMENT) ====================

  thehive:
    image: strangebee/thehive:${THEHIVE_VERSION:-5.2}
    container_name: soc-thehive
    restart: unless-stopped
    environment:
      - JVM_OPTS=-Xms2g -Xmx2g
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
      - MISP_ADMIN_PASSKEY=${MISP_ADMIN_PASSKEY:-ChangeMeMispKey123!}
      - SHUFFLE_API_KEY=${SHUFFLE_API_KEY:-ShuffleApiKeyChangeMe123!}
    ports:
      - "${THEHIVE_PORT:-9000}:9000"
    volumes:
      - thehive-data:/opt/thp/data
      - ./configs/thehive/application.conf:/etc/thehive/application.conf:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.40
    depends_on:
      cassandra:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 10

  cortex:
    image: thehiveproject/cortex:latest
    container_name: soc-cortex
    restart: unless-stopped
    environment:
      - JVM_OPTS=-Xms1g -Xmx2g
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
      - CORTEX_SECRET=${CORTEX_SECRET:-ChangeMeCortexSecret123456789012345}
    ports:
      - "${CORTEX_PORT:-9001}:9001"
    volumes:
      - cortex-data:/opt/cortex/data
      - ./configs/cortex/application.conf:/etc/cortex/application.conf:ro
      - ./configs/cortex/analyzers:/opt/cortex/analyzers:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.41
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:9001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ==================== MISP (THREAT INTELLIGENCE) ====================

  misp-core:
    image: harvarditsecurity/misp:${MISP_VERSION:-2.4}
    container_name: soc-misp-core
    restart: unless-stopped
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=${MISP_DB_NAME:-misp}
      - MYSQL_USER=${MISP_DB_USER:-misp}
      - MYSQL_PASSWORD=${MISP_DB_PASS:-MispDbPass123!}
      - MYSQL_PORT=3306
      - REDIS_FQDN=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASS:-RedisSoc123!}
      - POSTFIX_RELAY_HOST=smtp.example.com
      - MISP_BASEURL=${MISP_BASEURL:-https://misp.soc-lab.local}
      - MISP_ADMIN_EMAIL=${MISP_ADMIN_EMAIL:-admin@soc.local}
      - MISP_ADMIN_PASSKEY=${MISP_ADMIN_PASSKEY:-ChangeMeMispKey123!}
      - MISP_ADMIN_ORG=${MISP_ADMIN_ORG:-SOC-LAB}
      - MISP_ENABLE_ADVANCED_CORRELATION=1
      - MISP_ENABLE_SETTINGS_DEFAULT=1
    ports:
      - "${MISP_PORT:-8443}:443"
      - "${MISP_HTTP_PORT:-8081}:80"
      - "444:444"
    volumes:
      - misp-data:/var/www/MISP/app/files
    networks:
      soc-network:
        ipv4_address: 10.100.0.50
    depends_on:
      misp-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-s", "-o", "/dev/null", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 10

  misp-db:
    image: mysql:8.0
    container_name: soc-misp-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${MISP_DB_NAME:-misp}
      - MYSQL_USER=${MISP_DB_USER:-misp}
      - MYSQL_PASSWORD=${MISP_DB_PASS:-MispDbPass123!}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-CHANGE_ME}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      soc-network:
        ipv4_address: 10.100.0.51
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==================== SHUFFLE SOAR ====================

  shuffle-backend:
    image: ghcr.io/shuffle/shuffle:${SHUFFLE_VERSION:-1.3.0}
    container_name: soc-shuffle-backend
    restart: unless-stopped
    environment:
      - SHUFFLE_OPENSEARCH_URL=http://opensearch:9200
      - SHUFFLE_MONGODB_URL=mongodb://shuffle-mongo:27017/shuffle
      - SHUFFLE_API_KEY=${SHUFFLE_API_KEY:-ShuffleApiKeyChangeMe123!}
      - SHUFFLE_SWARM_CONFIG=shuffle
      - SHUFFLE_DOMAIN=http://shuffle.soc-lab.local:${SHUFFLE_PORT:-3443}
      - SHUFFLE_LOGGING_LEVEL=INFO
      - SHUFFLE_USE_HTTPS=false
    ports:
      - "${SHUFFLE_PORT:-3443}:3443"
    volumes:
      - shuffle-data:/app/data
      - ./configs/shuffle/shuffle.conf:/app/shuffle.conf:ro
      - ./integrations/shuffle_workflows:/app/workflows:ro
    networks:
      soc-network:
        ipv4_address: 10.100.0.60
    depends_on:
      - shuffle-mongo
      - shuffle-opensearch
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:3443/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:${SHUFFLE_VERSION:-1.3.0}
    container_name: soc-shuffle-frontend
    restart: unless-stopped
    environment:
      - BACKEND_HOST=shuffle-backend
      - BACKEND_PORT=3443
    ports:
      - "3080:80"
    networks:
      soc-network:
        ipv4_address: 10.100.0.61
    depends_on:
      - shuffle-backend

  shuffle-mongo:
    image: mongo:7.0
    container_name: soc-shuffle-mongo
    restart: unless-stopped
    volumes:
      - shuffle-data:/data/db
    networks:
      soc-network:
        ipv4_address: 10.100.0.62
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 15s
      timeout: 5s
      retries: 5

  shuffle-opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: soc-shuffle-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      soc-network:
        ipv4_address: 10.100.0.63

  # ==================== NETWORK MONITORING (IDS/IPS) ====================

  suricata:
    image: jasonish/suricata:${SURICATA_VERSION:-7.0}
    container_name: soc-suricata
    profiles:
      - linux-nsm
    restart: unless-stopped
    command: >
      -i ${SURICATA_INTERFACE:-eth0}
      -S /etc/suricata/rules/local.rules
      --af-packet=${SURICATA_INTERFACE:-eth0}
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    network_mode: host
    volumes:
      - ./configs/suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./logs/suricata:/var/log/suricata
      - suricata_rules:/etc/suricata/rules
    environment:
      - SURICATA_OPTIONS="--init-errors-fatal"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zeek:
    image: zeek/zeek:${ZEEK_VERSION:-6.0}
    container_name: soc-zeek
    profiles:
      - linux-nsm
    restart: unless-stopped
    command: |
      zeekctl deploy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - ./configs/zeek/zeekctl.cfg:/usr/local/zeek/etc/zeekctl.cfg:ro
      - ./configs/zeek/local.zeek:/usr/local/zeek/share/zeek/site/local.zeek:ro
      - ./logs/zeek:/usr/local/zeek/logs
      - zeek_data:/usr/local/zeek/spool
    healthcheck:
      test: ["CMD", "zeekctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== MONITORING & OBSERVABILITY ====================

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-2.51}
    container_name: soc-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus-data:/prometheus
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      soc-network:
        ipv4_address: 10.100.0.70

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.3}
    container_name: soc-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASS:-GrafanaAdmin123!}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,elasticsearch
      - GF_SERVER_ROOT_URL=http://grafana.soc-lab.local:${GRAFANA_PORT:-3000}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards/grafana:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      soc-network:
        ipv4_address: 10.100.0.71
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== LOG AGGREGATION & FORWARDING ====================

  filebeat:
    image: docker.elastic.co/beats/filebeat:${ELASTIC_VERSION:-8.11.0}
    container_name: soc-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/var/log/soc:ro
    command:
      - "-e"
      - "--strict.perms=false"
    networks:
      soc-network:
        ipv4_address: 10.100.0.80
    depends_on:
      - elasticsearch
      - kibana

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:${ELASTIC_VERSION:-8.11.0}
    container_name: soc-metricbeat
    restart: unless-stopped
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/hostfs/proc:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /:/hostfs:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-ChangeMeElastic123!}
    command:
      - "-e"
      - "--strict.perms=false"
    networks:
      soc-network:
        ipv4_address: 10.100.0.81
    depends_on:
      - elasticsearch

  # ==================== BACKUP & STORAGE ====================

  minio:
    image: minio/minio:latest
    container_name: soc-minio
    restart: unless-stopped
    command: server /data --console-address ":9003"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASS:-MinioAdmin123!}
    volumes:
      - minio-data:/data
      - minio-config:/root/.minio
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9003"
    networks:
      soc-network:
        ipv4_address: 10.100.0.90
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== VULNERABLE TARGETS (TESTING) ====================

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: soc-target-dvwa
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      soc-network:
        ipv4_address: 10.100.0.200

  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: soc-target-juice-shop
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      soc-network:
        ipv4_address: 10.100.0.201

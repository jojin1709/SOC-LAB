# TheHive - Application Configuration
# SOC Lab Deployment

# ===== DATABASE =====
db.janusgraph {
  storage {
    backend: cql
    hostname: ["cassandra"]
    port: 9042
    cql {
      cluster-name: soc-cluster
      keyspace: thehive
    }
  }
  index.search {
    backend: elasticsearch
    hostname: ["elasticsearch"]
    port: 9200
    elasticsearch {
      protocol: http
    }
    index-name: thehive
    username: "elastic"
    password: ${ELASTIC_PASSWORD}
  }
}

# ===== AUTHENTICATION =====
auth {
  provider: [local]
  local {
    # Default admin created on first start
  }
  # OAuth / SAML can be configured here
  # oauth2 {
  #   clientId: "..."
  #   clientSecret: "..."
  #   redirectUri: "..."
  # }
}

# ===== CORTEX INTEGRATION =====
cortex {
  "SOC-Cortex" {
    url: "http://cortex:9001"
    key: "CORTEX_API_KEY_HERE"
  }
}

# ===== MISP INTEGRATION =====
misp {
  "SOC-MISP" {
    url: "https://misp-core"
    key: ${MISP_ADMIN_PASSKEY}
    interval: 15m
    max-age: 365d
  }
}

# ===== ALERT NOTIFICATION =====
notification.webhook {
  # Shuffle SOAR webhook
  url: "http://shuffle-backend:3443/api/v1/webhook/trigger/SOC_ALERT"
  method: POST
  headers: {
    Authorization: "Bearer ${SHUFFLE_API_KEY}"
    Content-Type: "application/json"
  }
}

# ===== STREAMS/REALTIME =====
stream.search.allowAll: true

# ===== ATTACHMENT SIZE =====
attachment {
  maxSize: 50MB
}

# ===== GDPR / COMPLIANCE =====
gdpr {
  enabled: true
  # Retention period in days
  alertRetention: 365
  caseRetention: 730
}

# ===== AUDIT LOG =====
audit {
  enabled: true
  index: "thehive-audit"
}

# ===== PERFORMANCE =====
cache {
  enabled: true
  maxSize: 10000
}

<ossec_config>
  <global>
    <email_notification>no</email_notification>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>yes</logall>
    <logall_json>yes</logall_json>
    <queue_size>131072</queue_size>
  </global>

  <alerts>
    <log_alert_level>3</log_alert_level>
  </alerts>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <remote>
    <connection>syslog</connection>
    <port>514</port>
    <protocol>udp</protocol>
    <allowed-ips>10.100.0.0/24</allowed-ips>
  </remote>

  <rules>
    <include>local_rules.xml</include>
    <include>ciscat.xml</include>
    <include>auditd.xml</include>
    <include>web_apps.xml</include>
  </rules>

  <decoders>
    <include>custom_decoders.xml</include>
  </decoders>

  <integration>
    <name>custom-w2thive.py</name>
    <hook_url>http://thehive:9000</hook_url>
    <api_key>TH_API_KEY_HERE</api_key>
    <level>10</level>
    <alert_format>json</alert_format>
  </integration>

  <integration>
    <name>custom-w2misp.py</name>
    <hook_url>https://misp-core</hook_url>
    <api_key>MISP_API_KEY_HERE</api_key>
    <level>7</level>
    <alert_format>json</alert_format>
  </integration>

  <syscheck>
    <disabled>no</disabled>
    <frequency>7200</frequency>
    <scan_on_start>yes</scan_on_start>
    <auto_ignore>yes</auto_ignore>
    <alert_new_files>yes</alert_new_files>
    <directories check_all="yes" report_changes="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/bin,/sbin,/boot</directories>
    <windows_registry>HKLM\Software\Microsoft\Windows\CurrentVersion</windows_registry>
    <windows_registry>HKLM\System\CurrentControlSet\Services</windows_registry>
    <windows_registry>HKLM\Software\Microsoft\Internet Explorer</windows_registry>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>86400</frequency>
    <rootkit_files>/var/ossec/etc/rootcheck/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/rootcheck/rootkit_trojans.txt</rootkit_trojans>
    <windows_audit>/var/ossec/etc/rootcheck/win_audit.cis</windows_audit>
    <system_audit>/var/ossec/etc/rootcheck/system_audit.txt</system_audit>
    <system_audit>/var/ossec/etc/rootcheck/system_audit_rcl.txt</system_audit>
  </rootcheck>

  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_global_policy>no</skip_global_policy>
  </sca>

  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop.sh</executable>
    <expect>srcip</expect>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <disabled>no</disabled>
    <command>firewall-drop</command>
    <location>local</location>
    <level>10</level>
    <rules_id>1002,1003,1005,31151,31152</rules_id>
    <timeout>600</timeout>
  </active-response>
</ossec_config>
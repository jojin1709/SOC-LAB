events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ===== BASE SETTINGS =====
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    server_tokens off;

    # ===== LOGGING =====
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status"'
    '}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    limit_req_zone $binary_remote_addr zone=kibana:10m rate=10r/s;

    # ===== UPSTREAM DEFINITIONS =====
    upstream kibana_backend {
        server kibana:5601;
        keepalive 32;
    }

    upstream wazuh_dashboard_backend {
        server wazuh-dashboard:443;
        keepalive 32;
    }

    upstream thehive_backend {
        server thehive:9000;
        keepalive 16;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 16;
    }

    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 16;
    }

    upstream shuffle_backend {
        server shuffle-backend:5001;
        keepalive 16;
    }

    upstream misp_backend {
        server misp-core:443;
        keepalive 16;
    }

    # ===== KIBANA PROXY =====
    server {
        listen 80;
        server_name kibana.soc-lab.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name kibana.soc-lab.local;

        ssl_certificate /etc/nginx/ssl/soc-lab.crt;
        ssl_certificate_key /etc/nginx/ssl/soc-lab.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://kibana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Rate limit
            limit_req zone=kibana burst=20 nodelay;
        }
    }

    # ===== WAZUH DASHBOARD PROXY =====
    server {
        listen 80;
        server_name wazuh.soc-lab.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name wazuh.soc-lab.local;

        ssl_certificate /etc/nginx/ssl/soc-lab.crt;
        ssl_certificate_key /etc/nginx/ssl/soc-lab.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass https://wazuh_dashboard_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ===== THEHIVE PROXY =====
    server {
        listen 80;
        server_name thehive.soc-lab.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name thehive.soc-lab.local;

        ssl_certificate /etc/nginx/ssl/soc-lab.crt;
        ssl_certificate_key /etc/nginx/ssl/soc-lab.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 100M;

        location / {
            proxy_pass http://thehive_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ===== GRAFANA PROXY =====
    server {
        listen 80;
        server_name grafana.soc-lab.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name grafana.soc-lab.local;

        ssl_certificate /etc/nginx/ssl/soc-lab.crt;
        ssl_certificate_key /etc/nginx/ssl/soc-lab.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://grafana_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ===== SHUFFLE SOAR PROXY =====
    server {
        listen 80;
        server_name shuffle.soc-lab.local;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name shuffle.soc-lab.local;

        ssl_certificate /etc/nginx/ssl/soc-lab.crt;
        ssl_certificate_key /etc/nginx/ssl/soc-lab.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://shuffle_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
